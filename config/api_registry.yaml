# API Registry — Verified SDP API Endpoints
# ============================================
# Authority: Playwright MCP probing + SDP API Documentation
# This file is the SINGLE SOURCE OF TRUTH for whether an API endpoint exists.
#
# The AI code generator MUST check this registry before writing any RestAPI call.
# If an endpoint is marked `status: DOES_NOT_EXIST`, the operation MUST be done via UI.
#
# Status values:
#   VERIFIED_WORKING     — tested via Playwright sdpAPICall(), returns valid response
#   DOES_NOT_EXIST       — returns "Invalid URL" or 404 — do NOT use
#   UNTESTED             — not yet verified — verify before using in new code
#   DEPRECATED           — was once working, no longer supported
#
# Last updated: 2026-06-14

modules:

  changes:
    base_path: "api/v3/changes"
    input_wrapper: "change"
    plural_name: "changes"

    endpoints:
      create:
        method: POST
        path: "changes"
        status: VERIFIED_WORKING
        notes: "Creates a change. Returns change object with id."

      get:
        method: GET
        path: "changes/{id}"
        status: VERIFIED_WORKING

      update:
        method: PUT
        path: "changes/{id}"
        status: VERIFIED_WORKING
        notes: "Used for stage transitions, field updates, etc."

