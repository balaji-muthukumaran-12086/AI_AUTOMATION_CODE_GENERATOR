        status: VERIFIED_WORKING

      move_to_trash:
        method: DELETE
        path: "changes/{id}/move_to_trash"
        status: VERIFIED_WORKING
        notes: "Moves change to trash. Returns success."

      restore_from_trash:
        method: PUT
        path: "changes/{id}/restore_from_trash"
        status: VERIFIED_WORKING
        notes: "Restores from trash."

      permanent_delete:
        method: DELETE
        path: "changes/trash/{id}"
        status: VERIFIED_WORKING
        notes: "Permanently deletes a trashed change."

      # === LINKING — ALL NON-EXISTENT IN V3 ===
      link_parent_change:
        method: PUT
        path: "changes/{id}/link_parent_change"
        status: DOES_NOT_EXIST
        notes: "Returns 'Invalid URL'. Linking MUST be done via UI."
        verified_date: "2026-03-13"
        ui_alternative: "Open Associations tab → Attach → Parent Change → search → select → save"

